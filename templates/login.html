<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Attendance</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('https://as2.ftcdn.net/v2/jpg/07/92/07/73/1000_F_792077336_q5UoVtounlLvUWZKE9I3nOAdnaVSYu25.jpg') no-repeat center center/cover;
            height: 100vh;
        }

        .login-box {
            width: 350px;
            padding: 30px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>🎓 Student Login</h2>

        <form method="POST">
            <input type="text" name="id" placeholder="Student ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
